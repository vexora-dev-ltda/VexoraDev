name: Deploy to GitHub Pages

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      GITHUB_PAGES: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build + Export
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SITE_URL: 'https://vexora-dev-ltda.github.io/VexoraDev'
        run: npm run build && npm run export

      - name: Wrap `out` in repo folder for Pages
        env:
          REPO_NAME: 'VexoraDev'
        run: |
          set -e
          mkdir -p out_temp/${REPO_NAME}
          cp -a out/. out_temp/${REPO_NAME}/
          rm -rf out/*
          mv out_temp/* out/

      - name: Create root redirect to repo path
        run: |
          set -e
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/VexoraDev/">
            <meta name="robots" content="noindex">
            <script>location.replace('/VexoraDev/')</script>
            <title>Redirecting...</title>
          </head>
          <body>If you are not redirected, <a href="/VexoraDev/">click here</a>.</body>
          </html>
          HTML

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          token: ${{ secrets.GITHUB_TOKEN }}
